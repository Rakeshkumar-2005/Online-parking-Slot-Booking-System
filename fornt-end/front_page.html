<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Slot Booking</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>
    <div class="logo">
        Standway
    </div>

    <ul>
        <li>Find Parking</li>
        <li>Live Map</li>
        <li>Pricing</li>
        <li>Reviews</li>
        <li>About</li>
    </ul>

    <div class="buttons">
        <button class="login">Log In</button>
        <button class="start">Get Started →</button>
    </div>
</nav>

<section class="hero">

    <div class="badge">
        LIVE IN 200+ CITIES
    </div>

    <h1>
        Parking,
        <span>Finally</span>
        Solved.
    </h1>

    <p>
        Find verified parking in seconds.
        Book instantly and pay cashlessly.
    </p>

    <div class="hero-buttons">

        <button class="primary">
            <i class="fa-solid fa-magnifying-glass"></i>
            Find Parking Near Me
        </button>

        <button class="secondary">
            Watch Demo
        </button>

    </div>

</section>

<section class="stats">

<div class="card">
    <h2>50K+</h2>
    <p>Verified Spots</p>
</div>

<div class="card">
    <h2>200+</h2>
    <p>Cities</p>
</div>

<div class="card">
    <h2>4.9</h2>
    <p>App Rating</p>
</div>

<div class="card">
    <h2>5L+</h2>
    <p>Happy Users</p>
</div>

</section>

</body>
</html>
