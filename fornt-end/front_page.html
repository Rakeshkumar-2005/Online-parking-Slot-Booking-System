<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Slot Booking</title>

<link rel="stylesheet" href="style.css">
<script>
    function searchParking(){

    let location =
    document.getElementById("locationInput").value;

    let results =
    document.getElementById("parkingResults");

    results.innerHTML = "";

    let parkingData = [

        {
            name:"City Mall Parking",
            slots:20,
            price:"₹30/hr"
        },

        {
            name:"Railway Parking",
            slots:12,
            price:"₹20/hr"
        },

        {
            name:"Airport Parking",
            slots:35,
            price:"₹50/hr"
        }

    ];

    parkingData.forEach(parking=>{

        results.innerHTML += `

        <div class="parking-card">

            <h3>${parking.name}</h3>

            <p>
            Available Slots:
            ${parking.slots}
            </p>

            <p>
            Price:
            ${parking.price}
            </p>

            <button
            class="book-slot"
            onclick="openSlots('${parking.name}')">

                View Slots

            </button>

        </div>

        `;
    });

}
</script>

</head>

<body>
    

<nav>
    <div class="logo">
        Standway
    </div>

    <ul>
        <li>Find Parking</li>
        <li>Live Map</li>
        <li>Pricing</li>
        <li>Reviews</li>
        <li>About</li>
    </ul>

    <div class="buttons">
        <button class="login">Log In</button>
        <button class="start">Get Started →</button>
    </div>
</nav>

<section class="hero">

    <div class="badge">
        LIVE IN 200+ CITIES
    </div>

    <h1>
        Parking,
        <span>Finally</span>
        Solved.
    </h1>

    <p>
        Find verified parking in seconds.
        Book instantly and pay cashlessly.
    </p>

    <div class="hero-buttons">

        <button class="primary">
            <i class="fa-solid fa-magnifying-glass"></i>
            Find Parking Near Me
        </button>

        <button class="secondary">
            Watch Demo
        </button>

    </div>

</section>
<section class="find-parking">

    <h2>Find Parking Near You</h2>

    <div class="search-box">

        <input
        type="text"
        id="locationInput"
        placeholder="Enter Location">

        <button onclick="searchParking()">
            Search
        </button>

    </div>

    <div id="parkingResults">

    </div>

</section>

<section class="stats">

<div class="card">
    <h2>50K+</h2>
    <p>Verified Spots</p>
</div>

<div class="card">
    <h2>200+</h2>
    <p>Cities</p>
</div>

<div class="card">
    <h2>4.9</h2>
    <p>App Rating</p>
</div>

<div class="card">
    <h2>5L+</h2>
    <p>Happy Users</p>
</div>

</section>

</body>
</html>
