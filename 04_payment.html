<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020617;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.payment-box{

background:#0f172a;

padding:30px;

border-radius:15px;

width:400px;

color:white;
}

.payment-box h1{
text-align:center;
margin-bottom:20px;
}

.payment-box input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:8px;
}

.payment-box button{

width:100%;

padding:12px;

margin-top:15px;

border:none;

border-radius:8px;

background:#2563eb;

color:white;

cursor:pointer;

font-size:16px;
}

.slot-info{

background:#1e293b;

padding:10px;

border-radius:8px;

margin-bottom:15px;
}

</style>

</head>
<body>

<div class="payment-box">

<h1>Payment</h1>

<div class="slot-info">

Selected Slot:
<span id="slotNumber"></span>

</div>

<input type="text"
placeholder="Card Holder Name">

<input type="text"
placeholder="Card Number">

<input type="text"
placeholder="MM/YY">

<input type="password"
placeholder="CVV">

<button onclick="payNow()">
Pay ₹30
</button>

</div>

<script>

let slot =
localStorage.getItem("slot");

document.getElementById(
"slotNumber"
).innerText = slot;

function payNow(){

alert(
"Payment Successful"
);

window.location.href =
"05_success.html";

}

</script>

</body>
</html>
