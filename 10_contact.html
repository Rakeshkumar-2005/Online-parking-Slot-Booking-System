<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>
<style>
body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:50px;
}

form{
width:400px;
margin:auto;
background:#0f172a;
padding:25px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
width:100%;
}
</style>
</head>

<body>

<h1>Contact Us</h1>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="5" placeholder="Message"></textarea>

<button>Send Message</button>

</form>

</body>
</html>
