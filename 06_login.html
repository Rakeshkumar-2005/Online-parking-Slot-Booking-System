<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
background:#020617;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.box{
background:#0f172a;
padding:30px;
border-radius:15px;
width:350px;
}

h2{
color:white;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

p{
color:white;
text-align:center;
}
a{
color:#3b82f6;
}
</style>
</head>
<body>

<div class="box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<p>
Don't have an account?
<a href="07_register.html">
Register
</a>
</p>

</div>

<script>

function login(){

window.location.href=
"08_dashboard.html";

}

</script>

</body>
</html>
